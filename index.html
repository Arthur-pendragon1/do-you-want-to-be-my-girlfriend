<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day Invitation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe4e1; /* Warna pink muda agar lebih cantik */
        }

        #root {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px;
            text-align: center;
            background: radial-gradient(circle at top, #ffe4e1 0%, #ffd6de 40%, #ff9bb3 100%);
        }

        #container {
            width: min(560px, 90%);
            padding: 32px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(200, 80, 120, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        img {
            width: 240px;
            margin-bottom: 18px;
            border-radius: 24px;
            box-shadow: 0 18px 35px rgba(216, 27, 96, 0.22);
        }

        h1 {
            color: #c2185b;
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 0.03em;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-top: 28px;
        }

        .btn {
            font-size: 18px;
            padding: 14px 28px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            font-weight: 700;
            box-shadow: 0 12px 24px rgba(217, 27, 96, 0.16);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 18px 28px rgba(217, 27, 96, 0.22);
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff5fa2 0%, #fa2c79 100%);
        }

        #noBtn {
            background: linear-gradient(135deg, #ff1744 0%, #d50000 100%);
        }

        #showTimeBtn {
            background: linear-gradient(135deg, #ff8a00 0%, #ff3d00 100%);
            box-shadow: 0 14px 28px rgba(255, 69, 0, 0.24);
        }

        #yesBtn {
            transform-origin: center center;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        /* Pesan setelah klik YES */
        .countdown-label {
            font-size: 20px;
            color: #8c0040;
            margin-top: 24px;
            font-weight: 700;
        }

        .countdown {
            font-size: 26px;
            color: #d81b60;
            margin-top: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .success-msg {
            font-size: clamp(2rem, 3vw, 3.5rem);
            color: #d81b60;
            font-weight: 800;
            margin-top: 18px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>

    <div id="root">
        <div id="container">
            <img id="bearImage" src="https://media.tenor.com/VIChDQ6ejRQAAAAj/jumping-bear-hearts-no-png.gif" alt="Bears">
            
            <h1 id="question">do you want to be my girlfriend 💖</h1>
            <div class="buttons" id="buttonGroup">
                <button class="btn" id="yesBtn" onclick="showSuccess()">Yes</button>
                <button class="btn" id="noBtn" onclick="growYesButton()">No</button>
            </div>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let growInterval = null;
        let noClickCount = 0;
        const noMessages = [
            "No",
            "Pretty please? 🥺",
            "But we'd be so cute together! 💕",
            "One more chance, pookie?",
            "Don't break my heart :(",
            "What about a maybe?"
        ];

        // Fungsi saat tombol "Yes" diklik
        function showSuccess() {
            // Hentikan pertumbuhan tombol jika ada
            if (growInterval) {
                clearInterval(growInterval);
                growInterval = null;
            }
            
            const container = document.getElementById('container');
            container.innerHTML = `
                <img src="https://media.tenor.com/Fh39BC4pwNAAAAAd/snuggles-snuggle.gif" alt="Kisses">
                <div class="success-msg">we meet on mei 25th</div>
                <button class="btn" id="showTimeBtn" onclick="revealCountdown()">Tampilkan waktu</button>
                <div class="countdown-label" id="countdownLabel" style="display:none;">Waktu sampai pertemuan pertama:</div>
                <div class="countdown" id="countdown" style="display:none;"></div>
            `;
            restoreCountdownState();
        }

        function restoreCountdownState() {
            const shown = localStorage.getItem('countdownShown') === 'true';
            const btn = document.getElementById('showTimeBtn');
            const label = document.getElementById('countdownLabel');
            const countdownEl = document.getElementById('countdown');

            if (!btn || !label || !countdownEl) return;
            if (!shown) return;

            btn.style.display = 'none';
            btn.disabled = true;
            label.style.display = 'block';
            countdownEl.style.display = 'block';
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        function revealCountdown() {
            const btn = document.getElementById('showTimeBtn');
            const label = document.getElementById('countdownLabel');
            const countdownEl = document.getElementById('countdown');

            if (!btn || !label || !countdownEl) return;

            btn.style.display = 'none';
            label.style.display = 'block';
            countdownEl.style.display = 'block';
            btn.disabled = true;
            localStorage.setItem('countdownShown', 'true');

            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        // Fungsi saat tombol "No" diklik: setiap klik membuat tombol "Yes" membesar sedikit
        function growYesButton() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            
            // Ubah teks tombol No
            noClickCount++;
            if (noClickCount < noMessages.length) {
                noBtn.textContent = noMessages[noClickCount];
            }
            
            // Hentikan interval yang lama jika ada
            if (growInterval) {
                clearInterval(growInterval);
                growInterval = null;
            }

            // Setiap klik tombol No, tombol Yes membesar sedikit saja
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            if (yesScale >= 3) {
                // Jika sudah cukup besar, disable tombol No
                noBtn.disabled = true;
            }
        }

        function getTargetDate() {
            const now = new Date();
            const year = now.getFullYear();
            let target = new Date(year, 7, 14, 0, 0, 0);
            if (now > target) {
                target = new Date(year + 1, 7, 14, 0, 0, 0);
            }
            return target;
        }

        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            const now = new Date();
            const target = getTargetDate();
            const diff = target - now;

            if (diff <= 0) {
                countdownEl.textContent = 'The first date is today! ❤️';
                return;
            }

            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            countdownEl.textContent = `First date: today until August 14th — ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

    </script>

</body>
</html>
