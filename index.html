<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day Invitation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe4e1; /* Warna pink muda agar lebih cantik */
        }

        #root {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        img {
            width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d81b60;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: green;
        }

        #noBtn {
            background-color: red;
        }

        #yesBtn {
            transform-origin: center center;
            transition: transform 0.1s ease;
        }

        /* Pesan setelah klik YES */
        .success-msg {
            font-size: 48px;
            color: pink;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="root">
        <div id="container">
            <img id="bearImage" src="https://media.tenor.com/VIChDQ6ejRQAAAAj/jumping-bear-hearts-no-png.gif" alt="Bears">
            
            <h1 id="question">Will you be my Valentine? 💖</h1>
            
            <div class="buttons" id="buttonGroup">
                <button class="btn" id="yesBtn" onclick="showSuccess()">Yes</button>
                <button class="btn" id="noBtn" onclick="growYesButton()">No</button>
            </div>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let growInterval = null;
        let noClickCount = 0;
        const noMessages = [
            "No",
            "Pretty please? 🥺",
            "But we'd be so cute together! 💕",
            "One more chance, pookie?",
            "Don't break my heart :(",
            "What about a maybe?"
        ];

        // Fungsi saat tombol "Yes" diklik
        function showSuccess() {
            const container = document.getElementById('container');
            container.innerHTML = `
                <img src="https://media.tenor.com/Fh39BC4pwNAAAAAd/snuggles-snuggle.gif" alt="Kisses">
                <div class="success-msg">Yay!!! ❤️🥰</div>
            `;
        }

        // Fungsi saat tombol "No" diklik: mengubah teks dan membuat tombol "Yes" membesar terus menerus
        function growYesButton() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            
            // Ubah teks tombol No
            noClickCount++;
            if (noClickCount < noMessages.length) {
                noBtn.textContent = noMessages[noClickCount];
            }
            
            // Mulai membuat tombol Yes membesar
            if (growInterval) return;

            growInterval = setInterval(() => {
                yesScale += 0.05;
                yesBtn.style.transform = `scale(${yesScale})`;

                if (yesScale >= 3) {
                    clearInterval(growInterval);
                    growInterval = null;
                }
            }, 100);
        }
    </script>

</body>
</html>
