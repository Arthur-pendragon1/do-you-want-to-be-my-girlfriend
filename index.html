<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day Invitation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe4e1; /* Warna pink muda agar lebih cantik */
        }

        #root {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        img {
            width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d81b60;
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: green;
        }

        #noBtn {
            background-color: red;
        }

        /* Pesan setelah klik YES */
        .success-msg {
            font-size: 48px;
            color: pink;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="root">
        <div id="container">
            <img id="bearImage" src="https://media.tenor.com/VIChDO6ejRDAAAAj/jumping-bear-hearts-no-png.gif" alt="Bears">
            
            <h1 id="question">Will you be my Valentine? 💖</h1>
            
            <div class="buttons" id="buttonGroup">
                <button class="btn" id="yesBtn" onclick="showSuccess()">Yes</button>
                <button class="btn" id="noBtn" onmouseover="moveButton()">No</button>
            </div>
        </div>
    </div>

    <script>
        // Fungsi saat tombol "Yes" diklik
        function showSuccess() {
            const container = document.getElementById('container');
            container.innerHTML = `
                <img src="https://media.tenor.com/flxnRxTRxLAAAAAj/bears-with-kisses-bg.gif" alt="Kisses">
                <div class="success-msg">Yay!!! ❤️🥰</div>
            `;
        }

        // Fungsi opsional: Membuat tombol "No" berpindah-pindah saat didekati mouse
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>

</body>
</html>
